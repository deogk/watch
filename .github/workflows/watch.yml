name: Page Watch

on:
  # 외부(cron-job.org)에서 API로 깨울 때 사용하는 트리거
  repository_dispatch:
    types: [run-check]
  # 손으로 직접 돌려볼 수 있는 버튼도 유지
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run checker
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          # 외부 호출 시 client_payload 로 mode 를 넘기면 그 값을 쓰고,
          # 없으면 기본 watch 모드로 동작
          MODE: ${{ github.event.client_payload.mode || 'watch' }}
        run: python check.py
