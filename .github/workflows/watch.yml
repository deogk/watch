name: Page Watch

on:
  schedule:
    - cron: "*/5 * * * *"     # 5분마다: 평소 감시 (열림/문제 시에만 알림)
    - cron: "0 * * * *"       # 매시 정각: 생존 신호 (현재 상태 보고)
  workflow_dispatch:          # 수동 실행 버튼

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run checker
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          # 매시 정각 실행이면 heartbeat(생존 신호), 그 외에는 watch(평소 감시)
          MODE: ${{ github.event.schedule == '0 * * * *' && 'heartbeat' || 'watch' }}
        run: python check.py

# trigger schedule
